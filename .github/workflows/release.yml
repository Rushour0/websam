name: Release

# Manual-only until first publish (M4): the packages are pre-alpha 0.0.0 and
# the @websam npm scope isn't claimed yet, so auto-publish on push 404s. Once
# the scope is claimed and trusted publishing is configured, switch this back
# to `push: branches: [main]`.
on:
  workflow_dispatch:

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm trusted publishing (OIDC)

jobs:
  release:
    if: github.repository == 'Rushour0/websam' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build
        run: pnpm build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
